name: Monitoring Demo

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Run Step
      run: echo "Pipeline running"

    - name: Fail Step
      run: exit 0

  security:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Run TruffleHog Scan
      run: |
        docker run --rm -v $PWD:/repo trufflesecurity/trufflehog:latest filesystem /repo --fail
